name: 포트폴리오 가격 업데이트

on:
  workflow_dispatch:  # 수동 실행
  schedule:
    # 한국장 KST 09:00~16:00 = UTC 00:00~07:00 (평일)
    - cron: '*/5 0-7 * * 1-5'
    # 미국장 KST 22:30~05:00 = UTC 13:30~20:00 (평일)
    - cron: '30-59/5 13 * * 1-5'
    - cron: '*/5 14-19 * * 1-5'
    - cron: '0 20 * * 1-5'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: 패키지 설치
        run: npm install

      - name: 가격 업데이트 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        run: node update.js

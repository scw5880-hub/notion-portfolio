<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticker Tape</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: transparent; overflow: hidden; }
    .tradingview-widget-container { width: 100%; }
  </style>
</head>
<body>
<!-- TradingView Widget BEGIN -->
<div class="tradingview-widget-container">
  <div class="tradingview-widget-container__widget"></div>
  <script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-ticker-tape.js" async>
  {
    "symbols": [
      { "proName": "NASDAQ:COMP",    "title": "나스닥 종합" },
      { "proName": "CME_MINI:NQ1!",  "title": "나스닥100 선물" },
      { "proName": "NASDAQ:ASOX",    "title": "ASOX (AI반도체)" },
      { "proName": "NASDAQ:SOX",     "title": "SOX (반도체)" },
      { "proName": "FX_IDC:USDKRW", "title": "원/달러 환율" },
      { "proName": "TVC:US10Y",      "title": "미국 10년물 금리" }
    ],
    "showSymbolLogo": true,
    "isTransparent": false,
    "displayMode": "adaptive",
    "colorTheme": "light",
    "locale": "kr"
  }
  </script>
</div>
<!-- TradingView Widget END -->
</body>
</html>

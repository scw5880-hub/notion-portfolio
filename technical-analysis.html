<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #fff; overflow: hidden; }
    #selector { padding: 8px 12px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; }
    #selector { display: flex; flex-direction: column; gap: 6px; }
    .btn-row { display: flex; flex-wrap: wrap; gap: 4px; }
    .btn {
      padding: 4px 10px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }
    .btn:hover, .btn.active { background: #2962ff; color: white; border-color: #2962ff; }
    .search-row { display: flex; align-items: center; gap: 6px; }
    #symbolInput {
      padding: 5px 10px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 160px;
    }
    .search-btn {
      padding: 5px 12px;
      font-size: 13px;
      border: none;
      border-radius: 6px;
      background: #2962ff;
      color: white;
      cursor: pointer;
    }
    .search-btn:hover { background: #1a4fd6; }
    label { font-size: 13px; color: #555; }
    .tradingview-widget-container { width: 100%; height: 450px; }
  </style>
</head>
<body>
<div id="selector">
  <div class="btn-row">
    <button class="btn active" onclick="setActive(this,'NASDAQ:NVDA')">NVDA</button>
    <button class="btn" onclick="setActive(this,'NASDAQ:AVGO')">AVGO</button>
    <button class="btn" onclick="setActive(this,'NASDAQ:AMD')">AMD</button>
    <button class="btn" onclick="setActive(this,'NYSE:TSM')">TSM</button>
    <button class="btn" onclick="setActive(this,'NYSE:OKLO')">OKLO</button>
    <button class="btn" onclick="setActive(this,'NYSE:VRT')">VRT</button>
    <button class="btn" onclick="setActive(this,'NYSE:VST')">VST</button>
    <button class="btn" onclick="setActive(this,'NASDAQ:CEG')">CEG</button>
    <button class="btn" onclick="setActive(this,'NYSE:ETN')">ETN</button>
  </div>
  <div class="search-row">
    <label>직접 검색:</label>
    <input id="symbolInput" type="text" placeholder="예: AAPL, TSLA"
      onkeydown="if(event.key==='Enter') loadWidget(this.value.toUpperCase())"
    />
    <button class="search-btn" onclick="loadWidget(document.getElementById('symbolInput').value.toUpperCase())">검색</button>
  </div>
</div>

<div class="tradingview-widget-container">
  <div id="tv-ta-widget"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js"></script>
<script>
  function loadWidget(symbol) {
    const container = document.getElementById('tv-ta-widget');
    container.innerHTML = '';
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
    script.async = true;
    script.innerHTML = JSON.stringify({
      "interval": "1D",
      "width": "100%",
      "height": 450,
      "symbol": symbol,
      "showIntervalTabs": true,
      "displayMode": "single",
      "locale": "kr",
      "colorTheme": "light",
      "isTransparent": false
    });
    container.appendChild(script);
  }

  function setActive(el, symbol) {
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    el.classList.add('active');
    loadWidget(symbol);
  }

  loadWidget("NASDAQ:NVDA");
</script>
</body>
</html>

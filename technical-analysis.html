<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Technical Analysis</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #fff; overflow: hidden; }
    #selector { padding: 8px 12px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; }
    #symbolInput {
      padding: 6px 12px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
      width: 180px;
      margin-right: 6px;
    }
    #selector button {
      padding: 6px 14px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      background: #2962ff;
      color: white;
      cursor: pointer;
    }
    #selector button:hover { background: #1a4fd6; }
    #selector label { font-size: 14px; color: #555; margin-right: 8px; }
    .tradingview-widget-container { width: 100%; height: 450px; }
  </style>
</head>
<body>
<div id="selector">
  <label>종목 검색:</label>
  <input id="symbolInput" type="text" placeholder="예: AAPL, TSLA, NVDA"
    onkeydown="if(event.key==='Enter') loadWidget(this.value.toUpperCase())"
  />
  <button onclick="loadWidget(document.getElementById('symbolInput').value.toUpperCase())">검색</button>
</div>

<div class="tradingview-widget-container">
  <div id="tv-ta-widget"></div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js"></script>
<script>
  function loadWidget(symbol) {
    const container = document.getElementById('tv-ta-widget');
    container.innerHTML = '';
    const script = document.createElement('script');
    script.type = 'text/javascript';
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-technical-analysis.js';
    script.async = true;
    script.innerHTML = JSON.stringify({
      "interval": "1D",
      "width": "100%",
      "height": 450,
      "symbol": symbol,
      "showIntervalTabs": true,
      "displayMode": "single",
      "locale": "kr",
      "colorTheme": "light",
      "isTransparent": false
    });
    container.appendChild(script);
  }

  loadWidget("NASDAQ:NVDA");
</script>
</body>
</html>

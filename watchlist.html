<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관심 종목</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; background: #fff; overflow: hidden; }
    #selector { padding: 8px 12px; background: #f8f9fa; border-bottom: 1px solid #e0e0e0; display: flex; flex-direction: column; gap: 6px; }
    #editPanel { display: none; flex-direction: column; gap: 6px; padding: 8px; background: #fff; border: 1px solid #ddd; border-radius: 8px; }
    #editPanel.open { display: flex; }
    #tagRow { display: flex; flex-wrap: wrap; gap: 4px; min-height: 28px; }
    .tag {
      padding: 4px 8px; font-size: 12px; font-weight: 600;
      border: 1px solid #ddd; border-radius: 6px; background: white;
      display: flex; align-items: center; gap: 4px;
      cursor: grab; user-select: none;
    }
    .tag:active { cursor: grabbing; opacity: 0.5; }
    .tag.drag-over { border: 2px dashed #2962ff; background: #e8f0fe; }
    .remove { font-size: 11px; opacity: 0.4; cursor: pointer; }
    .remove:hover { opacity: 1; color: red; }
    .search-row { display: flex; align-items: center; gap: 6px; }
    #symbolInput {
      padding: 5px 10px; font-size: 13px;
      border: 1px solid #ccc; border-radius: 6px; width: 150px;
    }
    .action-btn { padding: 5px 12px; font-size: 13px; border: none; border-radius: 6px; cursor: pointer; }
    .add-btn { background: #00c853; color: white; }
    .add-btn:hover { background: #009624; }
    .edit-btn { background: #f0f0f0; color: #333; border: 1px solid #ccc; }
    .edit-btn:hover { background: #e0e0e0; }
    .top-bar { display: flex; justify-content: flex-end; }
    label { font-size: 13px; color: #555; }
    .tradingview-widget-container { width: 100%; height: calc(100vh - 60px); }
  </style>
</head>
<body>
<div id="selector">
  <div class="top-bar">
    <button class="action-btn edit-btn" onclick="toggleEdit()">⚙ 편집</button>
  </div>
  <div id="editPanel">
    <div id="tagRow"></div>
    <div class="search-row">
      <label>종목 추가:</label>
      <input id="symbolInput" type="text" placeholder="예: NASDAQ:AAPL 또는 AAPL"
        onkeydown="if(event.key==='Enter') addStock()"
      />
      <button class="action-btn add-btn" onclick="addStock()">+ 추가</button>
    </div>
  </div>
</div>

<div class="tradingview-widget-container">
  <div id="tv-widget"></div>
</div>

<script>
  const DEFAULT = [
    { s: 'NYSE:OKLO',      d: 'OKLO' },
    { s: 'NYSE:VRT',       d: 'VRT'  },
    { s: 'NYSE:VST',       d: 'VST'  },
    { s: 'NASDAQ:CEG',     d: 'CEG'  },
    { s: 'NYSE:ETN',       d: 'ETN'  },
    { s: 'NASDAQ:NVDA',    d: 'NVDA' },
    { s: 'NASDAQ:AVGO',    d: 'AVGO' },
    { s: 'NASDAQ:AMD',     d: 'AMD'  },
    { s: 'NYSE:TSM',       d: 'TSM'  },
    { s: 'FX_IDC:USDKRW', d: '원/달러 환율' },
  ];

  let dragSrc = null;

  function getList() {
    const saved = localStorage.getItem('watchlist_mo');
    return saved ? JSON.parse(saved) : DEFAULT;
  }

  function saveList(list) {
    localStorage.setItem('watchlist_mo', JSON.stringify(list));
  }

  function renderTags() {
    const row = document.getElementById('tagRow');
    row.innerHTML = '';
    getList().forEach((item, i) => {
      const tag = document.createElement('div');
      tag.className = 'tag';
      tag.draggable = true;
      tag.dataset.index = i;
      tag.innerHTML = `☰ ${item.d} <span class="remove" data-symbol="${item.s}">✕</span>`;

      tag.addEventListener('dragstart', e => {
        dragSrc = i;
        e.dataTransfer.effectAllowed = 'move';
      });
      tag.addEventListener('dragover', e => {
        e.preventDefault();
        tag.classList.add('drag-over');
      });
      tag.addEventListener('dragleave', () => tag.classList.remove('drag-over'));
      tag.addEventListener('drop', e => {
        e.preventDefault();
        tag.classList.remove('drag-over');
        if (dragSrc === null || dragSrc === i) return;
        const list = getList();
        const [moved] = list.splice(dragSrc, 1);
        list.splice(i, 0, moved);
        saveList(list);
        renderTags();
        loadWidget();
      });

      tag.querySelector('.remove').addEventListener('click', () => {
        const list = getList().filter(x => x.s !== item.s);
        saveList(list);
        renderTags();
        loadWidget();
      });

      row.appendChild(tag);
    });
  }

  function addStock() {
    let val = document.getElementById('symbolInput').value.trim().toUpperCase();
    if (!val) return;
    const symbol = val;
    const display = val.includes(':') ? val.split(':')[1] : val;
    const list = getList();
    if (list.find(i => i.s === symbol)) {
      document.getElementById('symbolInput').value = '';
      return;
    }
    list.push({ s: symbol, d: display });
    saveList(list);
    renderTags();
    loadWidget();
    document.getElementById('symbolInput').value = '';
  }

  function loadWidget() {
    const container = document.getElementById('tv-widget');
    container.innerHTML = '';
    const script = document.createElement('script');
    script.src = 'https://s3.tradingview.com/external-embedding/embed-widget-market-overview.js';
    script.async = true;
    script.innerHTML = JSON.stringify({
      "colorTheme": "light", "dateRange": "12M", "locale": "kr",
      "largeChartUrl": "", "isTransparent": false, "showFloatingTooltip": false,
      "plotLineColorGrowing": "rgba(41, 98, 255, 1)",
      "plotLineColorFalling": "rgba(41, 98, 255, 1)",
      "gridLineColor": "rgba(240, 243, 250, 0)", "scaleFontColor": "#0F0F0F",
      "belowLineFillColorGrowing": "rgba(41, 98, 255, 0.12)",
      "belowLineFillColorFalling": "rgba(41, 98, 255, 0.12)",
      "belowLineFillColorGrowingBottom": "rgba(41, 98, 255, 0)",
      "belowLineFillColorFallingBottom": "rgba(41, 98, 255, 0)",
      "symbolActiveColor": "rgba(41, 98, 255, 0.12)",
      "tabs": [{ "title": "관심 종목", "symbols": getList().map(i => ({ s: i.s, d: i.d })) }],
      "support_host": "https://www.tradingview.com",
      "width": "100%", "height": Math.max(window.innerHeight - 60, 400),
      "showSymbolLogo": true, "showChart": false
    });
    container.appendChild(script);
  }

  function toggleEdit() {
    const panel = document.getElementById('editPanel');
    panel.classList.toggle('open');
  }

  renderTags();
  loadWidget();
</script>
</body>
</html>
